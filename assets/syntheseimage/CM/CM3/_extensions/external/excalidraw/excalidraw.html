<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html,body,#app{
      margin:0;
      width:100%;
      height:100%;
      background:#1c1c1c;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw/dist/excalidraw.production.min.js"></script>
</head>

<body>
  <div id="app"></div>

<script>
const STORAGE_KEY = "excalidraw-board";

function saveScene(elements, appState){
  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify({ elements, appState })
  );
}

function loadScene(){
  const data = localStorage.getItem(STORAGE_KEY);
  if(!data) return {};
  try { return JSON.parse(data); } catch(e){ return {}; }
}

// ✅ Mets ici toutes tes libs
const LIBS = [
  "lib/stick-figures.excalidrawlib",
  "lib/math-teacher-library.excalidrawlib",
  "lib/awesome-icons.excalidrawlib"
];

Promise.all(
  LIBS.map(path =>
    fetch(path)
      .then(r => r.json())
      .catch(() => ({ libraryItems: [] }))   // si 404 -> ignore
  )
).then(libs => {

  const libraryItems = libs.flatMap(lib => lib.libraryItems || []);

  const el = React.createElement(
    ExcalidrawLib.Excalidraw,
    {
      theme: "dark",
      initialData: {
        ...loadScene(),
        appState: { 
        },
        libraryItems
      },
      onChange: (elements, appState) => saveScene(elements, appState)
    }
  );

  ReactDOM.render(el, document.getElementById("app"));
});
</script>
</body>
</html>
