<style>
#excalidraw-overlay{
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: none;
  background: rgba(0,0,0,0.35);
}

#excalidraw-panel{
  position: absolute;
  inset: 0;
  background: #1c1c1c;
}

#excalidraw-overlay iframe{
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #1c1c1c;
}

/* bouton quitter */
#excalidraw-close{
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 100000;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 26px;
  line-height: 42px;
  text-align: center;
  cursor: pointer;
  user-select: none;
}

#excalidraw-close:hover{
  background: rgba(255,255,255,0.10);
}
</style>

<div id="excalidraw-overlay" aria-hidden="true">
  <div id="excalidraw-panel">
    <div id="excalidraw-close" title="Quitter (Esc)">✕</div>
    <iframe id="excalidraw-iframe"></iframe>
  </div>
</div>

<script>
(() => {
  const overlay = document.getElementById("excalidraw-overlay");
  const panel   = document.getElementById("excalidraw-panel");
  const closeBt = document.getElementById("excalidraw-close");
  const iframe  = document.getElementById("excalidraw-iframe");

  function openBoard(){
    if (overlay.style.display === "block") return;

    iframe.src = window.location.origin + "/_extensions/external/excalidraw/excalidraw.html";
    overlay.style.display = "block";
    overlay.setAttribute("aria-hidden","false");
  }

  function closeBoard(){
    overlay.style.display = "none";
    overlay.setAttribute("aria-hidden","true");
    iframe.src = "about:blank";

    // IMPORTANT: si Reveal s'est mis en pause, on reprend
    if (window.Reveal && typeof Reveal.isPaused === "function" && Reveal.isPaused()) {
      Reveal.resume();
    }

    // Redonner le focus à la présentation
    const r = document.querySelector(".reveal");
    if (r) r.focus();
  }

  // B pour ouvrir
  window.addEventListener("keydown", (e) => {
    if ((e.key === "w" || e.key === "W") && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      openBoard();
    }
  }, true);

  // ESC pour fermer (capture, marche même si focus dans l'iframe)
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeBoard();
  }, true);

  // bouton quitter
  closeBt.addEventListener("click", closeBoard);
})();
</script>
